<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тригонометрический калькулятор</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            padding: 32px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            margin-bottom: 8px;
            font-size: 1.5rem;
        }
        .subtitle {
            color: #666;
            margin-bottom: 24px;
            font-size: 0.9rem;
        }
        .form-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            color: #444;
            font-weight: 500;
            font-size: 0.9rem;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.2s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        .row {
            display: flex;
            gap: 12px;
        }
        .row .form-group {
            flex: 1;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        button:active {
            transform: translateY(0);
        }
        .result {
            margin-top: 24px;
            padding: 16px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        .result.success {
            border-left-color: #28a745;
        }
        .result.error {
            border-left-color: #dc3545;
            color: #dc3545;
        }
        .result-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #333;
            margin-top: 8px;
        }
        .info {
            margin-top: 20px;
            padding: 12px;
            background: #e7f3ff;
            border-radius: 8px;
            font-size: 0.85rem;
            color: #0066cc;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔢 Тригонометрический калькулятор</h1>
        <p class="subtitle">Работа 5,6,7 — Вариант 1</p>

        <form method="POST">
            <div class="form-group">
                <label for="value">Значение угла:</label>
                <input type="number" step="any" name="value" id="value"
                       value="{{ request.form.value if request.form.value else '0' }}" required>
            </div>

            <div class="row">
                <div class="form-group">
                    <label for="unit">Единицы измерения:</label>
                    <select name="unit" id="unit">
                        <option value="radians" {% if request.form.unit == 'radians' %}selected{% endif %}>Радианы</option>
                        <option value="degrees" {% if request.form.unit == 'degrees' %}selected{% endif %}>Градусы</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="function">Функция:</label>
                    <select name="function" id="function">
                        <option value="sin" {% if request.form.function == 'sin' %}selected{% endif %}>sin</option>
                        <option value="cos" {% if request.form.function == 'cos' %}selected{% endif %}>cos</option>
                        <option value="tan" {% if request.form.function == 'tan' %}selected{% endif %}>tan</option>
                        <option value="cot" {% if request.form.function == 'cot' %}selected{% endif %}>cot</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="precision">Точность (знаков после запятой):</label>
                <input type="number" name="precision" id="precision"
                       min="0" max="15"
                       value="{{ request.form.precision if request.form.precision else '4' }}">
            </div>

            <button type="submit">🧮 Вычислить</button>
        </form>

        {% if error %}
        <div class="result error">
            {{ error }}
        </div>
        {% elif result %}
        <div class="result success">
            <strong>Результат:</strong>
            <div class="result-value">{{ result }}</div>
        </div>
        {% endif %}

        <div class="info">
            💡 <strong>Справка:</strong><br>
            • sin, cos — определены для всех значений<br>
            • tan не определён при π/2 + π·n (90°, 270°, ...)<br>
            • cot не определён при π·n (0°, 180°, ...)
        </div>
    </div>
</body>
</html>
